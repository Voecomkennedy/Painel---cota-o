<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>VoeComKennedy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:     #003366;
    --charcoal: #1a1a1a;
    --mid:      #6b6b6b;
    --soft:     #9b9b9b;
    --light:    #f7f7f7;
    --border:   #e8e8e8;
    --white:    #ffffff;
    --font:     'Inter', Helvetica, Arial, sans-serif;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--white);
    color: var(--charcoal);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .site-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.88);
    backdrop-filter: saturate(180%) blur(16px);
    -webkit-backdrop-filter: saturate(180%) blur(16px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }

  .site-header .logo {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--navy);
  }

  /* ── SLIDER ── */
  .slider-wrap {
    margin-top: 56px;
    position: relative;
    width: 100%;
    aspect-ratio: 4/3;
    background: var(--light);
    overflow: hidden;
    touch-action: pan-y;
  }

  @media (min-width: 600px) {
    .slider-wrap { aspect-ratio: 16/8; }
  }
  @media (min-width: 960px) {
    .slider-wrap { aspect-ratio: 21/9; }
  }

  .slides-track {
    display: flex;
    height: 100%;
    transition: transform 0.52s cubic-bezier(0.77,0,0.18,1);
    will-change: transform;
  }

  .slide {
    flex: 0 0 100%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .slide img.loading { opacity: 0; }

  /* Skeleton shimmer while image loads */
  .slide::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, #ebebeb 25%, #f5f5f5 50%, #ebebeb 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    z-index: 0;
  }

  .slide img { position: relative; z-index: 1; }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Gradient overlay bottom */
  .slider-wrap::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to top, rgba(0,0,0,0.28), transparent);
    pointer-events: none;
    z-index: 5;
  }

  /* Arrows */
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    width: 44px; height: 44px;
    background: rgba(255,255,255,0.9);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, opacity 0.2s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  .arrow:hover { background: var(--white); }
  .arrow.prev { left: 16px; }
  .arrow.next { right: 16px; }
  .arrow.hidden { opacity: 0; pointer-events: none; }

  @media (max-width: 480px) {
    .arrow { display: none; }
  }

  /* Dots */
  .dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    gap: 6px;
  }

  .dot-btn {
    width: 6px; height: 6px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    padding: 0;
    transition: background 0.2s, transform 0.2s;
  }

  .dot-btn.active {
    background: var(--white);
    transform: scale(1.4);
  }

  /* Thumbnail strip */
  .thumb-strip {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  .thumb-strip::-webkit-scrollbar { display: none; }

  .thumb {
    flex: 0 0 64px;
    height: 44px;
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .thumb.active { border-color: var(--navy); }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ── CONTENT ── */
  .content {
    max-width: 760px;
    margin: 0 auto;
    padding: 36px 24px 140px;
  }

  .location-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .location-text {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mid);
  }

  .maps-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border: 1px solid var(--navy);
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--navy);
    text-decoration: none;
    margin-left: 4px;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }

  .maps-btn:hover {
    background: var(--navy);
    color: var(--white);
  }

  .divider-dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--border);
    display: none;
  }

  .package-title {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    font-weight: 600;
    line-height: 1.2;
    color: var(--charcoal);
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--navy);
    margin-bottom: 24px;
    border-radius: 2px;
  }

  .description {
    font-size: 1rem;
    line-height: 1.8;
    color: #444;
    font-weight: 400;
    white-space: pre-wrap;
  }

  .features {
    margin-top: 36px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 480px) {
    .features { grid-template-columns: 1fr; }
  }

  .feature-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 16px;
    background: var(--light);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .feature-icon {
    flex-shrink: 0;
    width: 36px; height: 36px;
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .feature-text {
    font-size: 0.8rem;
    color: var(--mid);
    line-height: 1.4;
    font-weight: 400;
    padding-top: 2px;
  }

  .feature-text strong {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--charcoal);
    margin-bottom: 2px;
  }

  /* ── FLOATING CTA ── */
  .sticky-footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 200;
    padding: 16px 20px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
  }

  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
    padding: 15px 28px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: var(--font);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,51,102,0.35);
  }

  .cta-btn:hover {
    background: #00254d;
    box-shadow: 0 6px 28px rgba(0,51,102,0.45);
  }

  .cta-btn:active { transform: scale(0.98); }

  .cta-btn svg { flex-shrink: 0; }

  /* ── ERROR / EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 56px);
    text-align: center;
    padding: 40px 24px;
    gap: 16px;
  }

  .empty-state svg { color: var(--border); }

  .empty-state h2 {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--charcoal);
  }

  .empty-state p {
    font-size: 0.875rem;
    color: var(--mid);
    max-width: 300px;
    line-height: 1.6;
  }

  /* Hide slider extras when only 1 image */
  .single .arrow,
  .single .dots,
  .single .thumb-strip { display: none !important; }

  /* ── STARS & RATING ── */
  .hotel-meta-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .stars {
    display: flex;
    gap: 2px;
  }

  .stars svg.filled { color: #f5a623; }
  .stars svg.empty  { color: #ddd; }

  .rating-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: #003366;
    color: #fff;
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .rating-score {
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .rating-label {
    font-size: 0.72rem;
    font-weight: 500;
    opacity: 0.85;
  }
</style>
</head>
<body>

<header class="site-header">
  <span class="logo">VoeComKennedy</span>
</header>

<div id="app"></div>

<script>

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');

(function () {
  // Suporte ao formato comprimido (?p=...) E ao formato legado (?t=...&l=...&i1=...)
  const params = new URLSearchParams(window.location.search);
  let titulo = '', localizacao = '', descricao = '', whatsapp = '5562996448671', mapsUrl = '';
  let estrelas = 0, nota = '';
  const imgs = [];

  const compressed = params.get('p');
  if (compressed) {
    // Novo formato: dados comprimidos
    try {
      const data = JSON.parse(LZString.decompressFromEncodedURIComponent(compressed));
      titulo      = data.t || '';
      localizacao = data.l || '';
      descricao   = data.d || '';
      whatsapp    = data.w || '5562996448671';
      mapsUrl     = data.m || '';
      estrelas    = parseInt(data.s) || 0;
      nota        = data.n || '';
      for (let i = 1; i <= 5; i++) { if (data['i'+i]) imgs.push(data['i'+i]); }
    } catch(e) { /* link invalido */ }
  } else {
    // Formato legado (compatibilidade)
    titulo      = params.get('t') || '';
    localizacao = params.get('l') || '';
    descricao   = params.get('d') || '';
    whatsapp    = params.get('w') || '5562996448671';
    mapsUrl     = params.get('m') || '';
    estrelas    = parseInt(params.get('s')) || 0;
    nota        = params.get('n') || '';
    for (let i = 1; i <= 5; i++) { const v = params.get('i'+i); if (v) imgs.push(v); }
  }

  const app = document.getElementById('app');

  // ── EMPTY STATE ──────────────────────────────────────────────────
  if (!titulo || imgs.length === 0) {
    app.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <h2>Oferta nao encontrada</h2>
        <p>Este link nao possui dados validos. Por favor, solicite um novo link ao nosso time.</p>
      </div>`;
    return;
  }

  // ── SLIDES HTML ──────────────────────────────────────────────────
  const slidesHTML = imgs.map((url, i) => `
    <div class="slide" data-index="${i}">
      <img src="${escHtml(url)}" alt="Imagem ${i+1} — ${escHtml(titulo)}" class="loading"
           onload="this.classList.remove('loading')"
           onerror="this.style.opacity='0'">
    </div>`).join('');

  const dotsHTML = imgs.length > 1
    ? `<div class="dots">${imgs.map((_,i) =>
        `<button class="dot-btn${i===0?' active':''}" data-i="${i}" aria-label="Imagem ${i+1}"></button>`
      ).join('')}</div>` : '';

  const arrowsHTML = imgs.length > 1 ? `
    <button class="arrow prev" id="arrowPrev" aria-label="Anterior">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button class="arrow next" id="arrowNext" aria-label="Proximo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>` : '';

  const thumbsHTML = imgs.length > 1
    ? `<div class="thumb-strip">${imgs.map((url, i) =>
        `<div class="thumb${i===0?' active':''}" data-i="${i}">
          <img src="${escHtml(url)}" alt="" loading="lazy">
        </div>`
      ).join('')}</div>` : '';

  // ── FEATURES ─────────────────────────────────────────────────────
  const featuresHTML = `
    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11.2a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.5h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.9a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="feature-text">
          <strong>Atendimento Exclusivo</strong>
          Suporte dedicado 24h para sua reserva
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div class="feature-text">
          <strong>${escHtml(localizacao)}</strong>
          Destino selecionado
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="feature-text">
          <strong>Reserva Segura</strong>
          Transacao confidencial e protegida
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003366" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div class="feature-text">
          <strong>Experiencia Premium</strong>
          Curadoria de alto padrao
        </div>
      </div>
    </div>`;

  // ── STARS / RATING HTML ──────────────────────────────────────────
  function starsHTML(n) {
    if (!n || n < 1 || n > 5) return '';
    const starSVG = (filled) => `<svg width="14" height="14" viewBox="0 0 24 24" fill="${filled?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="${filled?'filled':'empty'}"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    return `<div class="stars">${Array.from({length:5},(_,i)=>starSVG(i<n)).join('')}</div>`;
  }

  function getRatingLabel(score) {
    const n = parseFloat(score);
    if (isNaN(n)) return score;
    if (n >= 9) return 'Excelente';
    if (n >= 8) return 'Muito bom';
    if (n >= 7) return 'Bom';
    if (n >= 6) return 'Agradavel';
    return 'Satisfatorio';
  }

  function notaHTML(notaStr) {
    if (!notaStr) return '';
    // Se o usuario ja colocou label (ex: "8.4 Muito bom"), usa como esta
    // Caso seja so numero, gera label automatico
    const parts = notaStr.trim().split(/\s+/);
    const score = parts[0];
    const label = parts.slice(1).join(' ') || getRatingLabel(score);
    return `<div class="rating-badge"><span class="rating-score">${escHtml(score)}</span><span class="rating-label">${escHtml(label)}</span></div>`;
  }

  const metaRowHTML = (estrelas || nota) ? `<div class="hotel-meta-row">${starsHTML(estrelas)}${notaHTML(nota)}</div>` : '';

  // ── WHATSAPP MESSAGE ──────────────────────────────────────────────
  const msg = encodeURIComponent(
    `Ola! Tenho interesse no pacote *${titulo}* (${localizacao}). Poderia me enviar mais informacoes e verificar disponibilidade?`
  );
  const waHref = `https://wa.me/${whatsapp.replace(/\D/g,'')}?text=${msg}`;

  // ── RENDER ────────────────────────────────────────────────────────
  app.innerHTML = `
    <div class="slider-wrap${imgs.length===1?' single':''}">
      <div class="slides-track" id="track">${slidesHTML}</div>
      ${arrowsHTML}
      ${dotsHTML}
    </div>
    ${thumbsHTML}

    <div class="content">
      <div class="location-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="location-text">${escHtml(localizacao)}</span>
        ${mapsUrl ? `
        <a class="maps-btn" href="${escHtml(mapsUrl)}" target="_blank" rel="noopener">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="3 11 22 2 13 21 11 13 3 11"/>
          </svg>
          Ver no Mapa
        </a>` : ''}
      </div>
      ${metaRowHTML}
      <h1 class="package-title">${escHtml(titulo)}</h1>
      <div class="divider"></div>
      ${descricao ? `<p class="description">${escHtml(descricao)}</p>` : ''}
      ${featuresHTML}
    </div>

    <div class="sticky-footer">
      <a class="cta-btn" href="${waHref}" target="_blank" rel="noopener">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zm-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884zm8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Solicitar Reserva via WhatsApp
      </a>
    </div>`;

  // ── SLIDER LOGIC ──────────────────────────────────────────────────
  if (imgs.length <= 1) return;

  let current = 0;
  const total = imgs.length;
  const track  = document.getElementById('track');
  const dotBtns = document.querySelectorAll('.dot-btn');
  const thumbs  = document.querySelectorAll('.thumb');
  const prevBtn = document.getElementById('arrowPrev');
  const nextBtn = document.getElementById('arrowNext');

  function goTo(n) {
    current = (n + total) % total;
    track.style.transform = `translateX(-${current * 100}%)`;
    dotBtns.forEach((d,i) => d.classList.toggle('active', i===current));
    thumbs.forEach((t,i) => t.classList.toggle('active', i===current));
    if (prevBtn) prevBtn.classList.toggle('hidden', false);
    if (nextBtn) nextBtn.classList.toggle('hidden', false);
  }

  if (prevBtn) prevBtn.addEventListener('click', () => goTo(current - 1));
  if (nextBtn) nextBtn.addEventListener('click', () => goTo(current + 1));

  dotBtns.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.i)));
  thumbs.forEach(t => t.addEventListener('click', () => goTo(+t.dataset.i)));

  // Touch / swipe
  let startX = 0, isDragging = false;
  const wrap = document.querySelector('.slider-wrap');

  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    isDragging = true;
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (!isDragging) return;
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(current + (diff > 0 ? 1 : -1));
    isDragging = false;
  }, { passive: true });

  // Mouse drag (desktop)
  wrap.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
  wrap.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const diff = startX - e.clientX;
    if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
    isDragging = false;
  });
  wrap.addEventListener('mouseleave', () => isDragging = false);

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // Auto-scroll thumb strip to keep active thumb visible
  function scrollThumbIntoView() {
    const active = document.querySelector('.thumb.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  const observer = new MutationObserver(scrollThumbIntoView);
  thumbs.forEach(t => observer.observe(t, { attributeFilter: ['class'] }));

})();
</script>
</body>
</html>
